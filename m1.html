<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container{
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .box{
            flex: 1;
            height: 150px;
            background-color: orange;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
        }

        @media (max-width:600px){
            .container{
                flex-direction: column;
            }
            .box{
                background: lightgreen;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>
</body>
</html>
